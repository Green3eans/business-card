<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Jason Johns | Digital Business Card</title>

  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .card {
      max-width: 430px;
      margin: 0 auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      text-align: center;
    }

    .photo {
      width: 135px;
      height: 135px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 18px;
      border: 4px solid #e5e7eb;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .title {
      margin-top: 6px;
      color: #4b5563;
      font-size: 16px;
    }

    .company {
      margin-top: 8px;
      margin-bottom: 24px;
      font-weight: bold;
      font-size: 17px;
    }

    a.button {
      display: block;
      margin: 12px 0;
      padding: 14px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      background: #0f62fe;
      color: white;
    }

    a.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .footer {
      margin-top: 22px;
      color: #6b7280;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="photo" src="profile.jpg" alt="Jason Johns photo" />

    <h1>Jason Johns</h1>
    <div class="title">Business Development Engineer</div>
    <div class="company">Powerside</div>

    <a class="button" href="jason-johns.vcf">Save Contact</a>
    <a class="button secondary" href="tel:+1XXXXXXXXXX">Call</a>
    <a class="button secondary" href="mailto:your.email@powerside.com">Email</a>
    <a class="button secondary" href="https://www.linkedin.com/in/your-linkedin">LinkedIn</a>
    <a class="button secondary logo-button" href="https://www.powerside.com">
  <img src="powerside-logo.png" alt="Powerside logo" />
  <span>Powerside Website</span>
</a>

    <div class="footer">
      Tap “Save Contact” to add my information to your phone.
    </div>
  </div>
</body>
</html>
